name: Claude Code

# Allows @claude mentions in issues, PR comments, and PR reviews to trigger
# Claude (via Anthropic's GitHub App) to read the repo and propose changes.
# Setup:
#   1. Install the App at https://github.com/apps/claude on this repo.
#   2. Add an ANTHROPIC_API_KEY secret in Settings → Secrets and variables → Actions.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
